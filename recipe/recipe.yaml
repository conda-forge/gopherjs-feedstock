schema_version: 1

context:
  version: "1.20.2"

package:
  name: gopherjs
  version: ${{ version }}

source:
  url: https://github.com/gopherjs/gopherjs/archive/v${{ version }}.tar.gz
  sha256: 305bab37bca7051fc716e3f382bacb1aefd35d998e2044257cc27fadcdda3944

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - gopherjs --help

about:
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  summary: A compiler from Go to JavaScript for running Go code in a browser
  homepage: https://github.com/gopherjs/gopherjs
  repository: https://github.com/gopherjs/gopherjs

extra:
  recipe-maintainers:
    - danielnachun
